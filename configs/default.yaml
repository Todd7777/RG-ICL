name: rg_icl_default
seed: 42
data_root: data
output_root: outputs
features_root: outputs/features

encoder:
  name: dinov3
  model_id: facebook/dinov2-large
  device: cpu
  batch_size: 32
  image_size: 518
  normalize: true

retrieval:
  method: global_spatial
  k: 6
  alpha: 0.5
  similarity_metric: cosine
  exclude_query: true
  exclude_test_set: true

inference:
  model: gpt-4o
  temperature: 0.0
  max_tokens: 1024
  seed: 42
  top_p: 1.0
  api_key_env: OPENAI_API_KEY

metrics:
  classification:
    - auc
    - sens_at_spec90
    - accuracy
    - brier
    - ece
    - nll
  vqa_lexical:
    - bleu4
    - rouge_l
    - meteor
  bootstrap_n: 2000
  bootstrap_seed: 42
  ci_level: 0.95

judge:
  model: gpt-5
  temperature: 0.0
  seed: 42
  n_samples_per_dataset: 300
  dimensions:
    - clinical_correctness
    - evidence_grounding
    - completeness
    - uncertainty_acknowledgement
  score_range: [0, 5]

robustness:
  imbalance_ratios:
    - {neg: 5, pos: 1}
    - {neg: 3, pos: 3}
    - {neg: 1, pos: 5}
  ordering_permutations: 10
  ordering_seed: 42
  label_inconsistency_encoder: dinov3

datasets:
  - lag
  - ddr
  - chexpert
  - breakhis
  - medical_cxr_vqa
  - vqa_rad
  - pathvqa
  - pmc_vqa

methods:
  - zero_shot
  - naive_icl
  - rg_icl_global
  - rg_icl_global_spatial
