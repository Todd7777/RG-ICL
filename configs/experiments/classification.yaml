name: classification
seed: 42
data_root: data
output_root: outputs/classification
features_root: outputs/features

encoder:
  name: dinov3
  model_id: facebook/dinov2-large
  device: mps
  batch_size: 8
  image_size: 518
  normalize: true

retrieval:
  method: global_spatial
  k: 6
  alpha: 0.5
  similarity_metric: cosine
  exclude_query: true
  exclude_test_set: true

inference:
  model: gpt-4o
  temperature: 0.0
  max_tokens: 1024
  seed: 42
  top_p: 1.0
  api_key_env: OPENAI_API_KEY

datasets:
  - lag

methods:
  - naive_icl
  - rg_icl_global
  - rg_icl_global_spatial
